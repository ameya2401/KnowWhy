services:
  postgres:
    image: postgres:16-alpine
    container_name: knowwhy-postgres
    environment:
      POSTGRES_USER: knowwhy
      POSTGRES_PASSWORD: knowwhy
      POSTGRES_DB: knowwhy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowwhy -d knowwhy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: knowwhy-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowwhy-backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://knowwhy:knowwhy@postgres:5432/knowwhy
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      VALIDATE_EXTERNAL_SERVICES_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowwhy-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
